<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedCare Monitor</title>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0e1117; color: #fafafa; padding: 1rem; }
        h1 { margin-bottom: 1rem; }
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .card { background: #262730; border-radius: 8px; padding: 1rem; }
        .card .label { font-size: 0.85rem; color: #808495; }
        .card .value { font-size: 1.8rem; font-weight: bold; margin-top: 0.3rem; }
        .tabs { display: flex; border-bottom: 2px solid #262730; }
        .tab { padding: 0.7rem 1.5rem; cursor: pointer; background: none; border: none; color: #808495; font-size: 1rem; }
        .tab.active { color: #ff4b4b; border-bottom: 2px solid #ff4b4b; margin-bottom: -2px; }
        #chart { background: #262730; border-radius: 0 0 8px 8px; padding: 0.5rem; min-height: 460px; }
        .no-data { padding: 2rem; color: #808495; }
        @media (max-width: 600px) {
            .cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <h1>SeedCare Monitor</h1>
    <div class="cards" id="cards"><div class="no-data">読み込み中...</div></div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab(1, this)">1日表示</button>
        <button class="tab" onclick="switchTab(7, this)">1週間表示</button>
        <button class="tab" onclick="switchTab(30, this)">1ヶ月表示</button>
    </div>
    <div id="chart"></div>

    <script>
        let currentDays = 1;

        function switchTab(days, btn) {
            currentDays = days;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            loadChart();
        }

        function toLocal(dt) {
            return dt.getFullYear() + '-' +
                String(dt.getMonth()+1).padStart(2,'0') + '-' +
                String(dt.getDate()).padStart(2,'0') + ' ' +
                String(dt.getHours()).padStart(2,'0') + ':' +
                String(dt.getMinutes()).padStart(2,'0') + ':' +
                String(dt.getSeconds()).padStart(2,'0');
        }

        async function loadLatest() {
            try {
                const res = await fetch('/api/latest');
                const d = await res.json();
                if (!d) { document.getElementById('cards').innerHTML = '<div class="no-data">データなし</div>'; return; }
                document.getElementById('cards').innerHTML = [
                    { label: 'Temp 0' + (d.relay0 === 'ON' ? ' \u{1F525}' : ''), value: d.temperature0.toFixed(1) + '\u2103' },
                    { label: 'Moisture 0', value: d.moisture0.toFixed(1) + '%' },
                    { label: 'Temp 1' + (d.relay1 === 'ON' ? ' \u{1F525}' : ''), value: d.temperature1.toFixed(1) + '\u2103' },
                    { label: 'Moisture 1', value: d.moisture1.toFixed(1) + '%' },
                ].map(c => '<div class="card"><div class="label">' + c.label + '</div><div class="value">' + c.value + '</div></div>').join('');
            } catch(e) { console.error('loadLatest:', e); }
        }

        async function loadChart() {
            try {
                const res = await fetch('/api/data?days=' + currentDays);
                const d = await res.json();
                if (!d.dateTime || !d.dateTime.length) {
                    Plotly.purge('chart');
                    document.getElementById('chart').innerHTML = '<div class="no-data">データがありません</div>';
                    return;
                }
                const titles = {1: '過去24時間', 7: '過去1週間', 30: '過去1ヶ月'};
                const now = new Date();
                const start = new Date(now - currentDays * 86400000);
                Plotly.newPlot('chart', [
                    { x: d.dateTime, y: d.moisture0, name: 'Moisture 0', line: {color: '#636EFA', dash: 'dot'}, yaxis: 'y' },
                    { x: d.dateTime, y: d.moisture1, name: 'Moisture 1', line: {color: '#00CC96', dash: 'dot'}, yaxis: 'y' },
                    { x: d.dateTime, y: d.temperature0, name: 'Temp 0', line: {color: '#EF553B'}, yaxis: 'y2' },
                    { x: d.dateTime, y: d.temperature1, name: 'Temp 1', line: {color: '#FF7F0E'}, yaxis: 'y2' },
                ], {
                    title: titles[currentDays],
                    hovermode: 'x unified',
                    height: 450,
                    paper_bgcolor: '#262730',
                    plot_bgcolor: '#262730',
                    font: { color: '#fafafa' },
                    xaxis: { range: [toLocal(start), toLocal(now)], gridcolor: '#3a3a4a' },
                    yaxis: { title: 'Moisture (%)', gridcolor: '#3a3a4a' },
                    yaxis2: { title: 'Temperature (\u2103)', overlaying: 'y', side: 'right', gridcolor: '#3a3a4a' },
                    legend: { orientation: 'h', y: -0.15 },
                }, { responsive: true });
            } catch(e) {
                console.error('loadChart:', e);
                document.getElementById('chart').innerHTML = '<div class="no-data">エラー: ' + e.message + '</div>';
            }
        }

        loadLatest();
        loadChart();
        setInterval(loadLatest, 30000);
        setInterval(loadChart, 30000);
    </script>
</body>
</html>
